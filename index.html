<title>Pankaj Art Gallery</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    margin-top:60px;
    background:#F4F9F6; /* light soft green background */
}

h2{
    color:#0F3D2E; /* bottle green heading */
}

/* Default Button Style */
.btn{
    display:block;
    margin:15px auto;
    padding:15px;
    width:240px;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-size:18px;
    transition:0.3s;
}

/* Green Button */
.green{
    background:#0F3D2E;
}

.green:hover{
    background:#145A44;
    transform:scale(1.03);
}

/* Red Button */
.red{
    background:#A4161A;
}

.red:hover{
    background:#C1121F;
    transform:scale(1.03);
}
</style>
</head>
